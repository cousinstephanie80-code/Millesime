<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Millésime Secret : Aventure pour des 80 ans Tissés</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Définition des couleurs thématiques pour la cohérence */
        :root {
            --color-cacao-dark: #4F352C;    /* Brun Cacao / Textile foncé */
            --color-millésime-gold: #B48A64; /* Or/Vin */
            --color-beige-textile: #F7F4F0; /* Beige clair, fond des popups */
            --color-text-dark: #3E332C;
            --color-lock-red: #924B4B;
        }

        body {
            margin: 0;
            font-family: 'Lato', sans-serif;
            background-color: var(--color-beige-textile);
            color: var(--color-text-dark);
            text-align: center;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--color-cacao-dark);
            margin-top: 5vh;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            letter-spacing: 1px;
            font-weight: 700;
        }

        p.intro {
            max-width: 800px;
            margin: 2vh auto 5vh;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            line-height: 1.6;
            color: var(--color-cacao-dark);
            opacity: 0.9;
        }

        /* --- Grille centrée --- */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto 6vh;
            padding: 0 5vw;
        }

        /* --- Vignette générale --- */
        .vignette {
            width: 100%;
            max-width: 300px;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background: #fff;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease forwards;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            /* Ajout des styles pour ressembler à une vignette déverrouillée */
            filter: grayscale(0); /* S'assurer qu'il n'y a pas de filtre de gris */
            opacity: 1; /* S'assurer qu'elle est entièrement visible */
        }
        
        @media (max-width: 600px) {
            .vignette {
                max-width: 90%; 
            }
        }

        .vignette:nth-child(1) { animation-delay: 0.1s; }
        .vignette:nth-child(2) { animation-delay: 0.2s; }
        .vignette:nth-child(3) { animation-delay: 0.3s; }
        .vignette:nth-child(4) { animation-delay: 0.4s; }
        .vignette:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .vignette:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 10px 18px rgba(0,0,0,0.15);
        }

        .vignette img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            transition: transform 0.5s ease, filter 0.4s ease;
        }

        .vignette:hover img {
            transform: scale(1.08);
            filter: brightness(1.05);
        }

        .vignette h3 {
            margin: 1rem 0 0.3rem;
            color: var(--color-millésime-gold);
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
        }

        .vignette p {
            font-size: 0.9rem;
            color: var(--color-cacao-dark);
            margin-bottom: 1.2rem;
            padding: 0 1rem;
            opacity: 0.8;
        }

        /* --- Styles Spécifiques --- */
        .vignette.noel {
            border: 3px solid #ffaa00; /* Bordure festive pour UX */
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.4);
        }
        .vignette.noel h3 {
            color: #d89617; 
        }

        /* Suppression de l'état verrouillé car toutes les vignettes sont déverrouillées */
        .vignette.locked {
            /* Ces styles ne sont plus appliqués par le JS, mais peuvent rester ici sans effet. */
            filter: grayscale(0.8) opacity(0.5);
            cursor: not-allowed;
            background: var(--color-beige-textile);
        }
        .vignette.locked:hover {
            transform: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>
    <h1>La trame secrète du Millésime 🍷🍫</h1>
    <p class="intro">
        Une aventure tissée à plusieurs mains pour l'anniversaire d'un cœur en or.<br>
        Chaque étape débloquée vous mène au cœur d'un <strong>savoir-faire ancien</strong>, à l'<strong>essence d'un grand cru</strong> et à l'<strong>éloge des sens</strong>.
    </p>

    <div class="gallery" id="gallery"></div>

    <script>
        // La logique de verrouillage basée sur la date et le mode preview est supprimée.
        // Toutes les vignettes sont considérées comme déverrouillées.
        
        const vignettes = [
            {
                titre: "Le Début d'un Secret", // Vignette 1 (Noël)
                phrase: "Là où tout commence, dans le silence de l'hiver...",
                img: "images/noel.jpg",
                lien: "noel.html",
                isNoel: true
            },
            {
                titre: "💛 Les Voix du Cœur", // Vignette 2 (Juin / Audio)
                phrase: "Juste avant le départ, un murmure familial pour vous guider sur la route...",
                img: "images/voix.jpg",
                lien: "message_route.html"
            },
            {
                titre: "🛣️ La Route des Souvenirs", // Vignette 3 (Jour 1)
                phrase: "Chaque virage mène à un souvenir.",
                img: "images/jour1.jpg",
                lien: "jour1_accueil.html"
            },
            {
                titre: "💎 Le Secret du Millésime", // Vignette 4 (Jour 2)
                phrase: "Certains secrets ne se dévoilent qu'à maturité.",
                img: "images/jour2.jpg",
                lien: "jour2_accueil.html"
            },
            {
                titre: "📜 Ce que les uns partagent", // Vignette 5 (Livre d'Or)
                phrase: "Le séjour s'achève, mais l'histoire continue de s'écrire.",
                img: "images/livre.jpg",
                lien: "livre-or.html"
            }
        ];

        // -------- LOGIQUE DES VIGNETTES --------
        const gallery = document.getElementById("gallery");
        
        vignettes.forEach(v => {
            const div = document.createElement("div");
            
            let className = "vignette";
            if (v.isNoel) {
                className += " noel";
            }
            // La classe "locked" n'est plus ajoutée.
            
            div.className = className;
            div.innerHTML = `
                <img src="${v.img}" alt="${v.titre}">
                <h3>${v.titre}</h3>
                <p>${v.phrase}</p>
            `;

            div.addEventListener("click", () => {
                window.location.href = v.lien;
            });

            gallery.appendChild(div);
        });
    </script>

</body>
</html>
